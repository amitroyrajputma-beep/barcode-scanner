<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Box Scanner</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:60px;
        }

        input{
            font-size:22px;
            padding:10px;
            width:300px;
            text-align:center;
        }

        #result{
            margin-top:20px;
            font-size:26px;
            font-weight:bold;
        }

        .ok{ color:green; }
        .bad{ color:red; }
    </style>
</head>
<body>

<h2>📦 Box Scanner System</h2>

<p>Scan barcode using your scanner</p>

<input type="text" id="scanInput" autofocus placeholder="Scan here">

<div id="result">Waiting for scan...</div>

<script>

const boxList = [
    "PBA9294014508S",
    "PD31262424545S",
    "PH45358511412S"
];

const input = document.getElementById("scanInput");

input.addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        let value = input.value.trim();

        if(boxList.includes(value)){
            document.getElementById("result").innerHTML =
                "✅ MATCH FOUND: " + value;
            document.getElementById("result").className = "ok";
        }
        else{
            document.getElementById("result").innerHTML =
                "❌ NOT FOUND: " + value;
            document.getElementById("result").className = "bad";
        }

        input.value = "";
    }
});

</script>

</body>
</html>
