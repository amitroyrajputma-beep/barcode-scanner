<!DOCTYPE html>
<html>
<head>
    <title>Warehouse Scanner Auto Tab</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:40px;
        }

        textarea, input{
            font-size:18px;
            padding:10px;
            width:320px;
            margin:10px;
        }

        #scanInput{
            font-size:24px;
            text-align:center;
        }

        #result{
            margin-top:20px;
            font-size:26px;
            font-weight:bold;
        }

        .ok{ color:green; }
        .bad{ color:red; }
        .info{ color:blue; }
    </style>
</head>
<body>

<h2>📦 Auto Tab Warehouse Scanner</h2>

<h3>Step 1: Load Box List</h3>

<textarea id="boxInput" rows="5">
PBA9294014508S
PD31262424545S
PH45358511412S
</textarea>

<br>

<button onclick="loadBoxes()">Load Boxes</button>

<div id="status" class="info">No boxes loaded</div>

<hr>

<h3>Step 2: Scan Continuously</h3>

<input type="text" id="scanInput" autofocus placeholder="Scan barcode here">

<div id="result">Waiting for scan...</div>

<script>

let boxList = [];

function loadBoxes(){
    let text = document.getElementById("boxInput").value;

    boxList = text.split("\n").map(x => x.trim()).filter(x => x !== "");

    document.getElementById("status").innerHTML =
        "✅ Loaded " + boxList.length + " boxes";

    document.getElementById("status").className = "ok";

    focusScan();
}

// keep focus always on scanner input
function focusScan(){
    setTimeout(() => {
        document.getElementById("scanInput").focus();
    }, 100);
}

const input = document.getElementById("scanInput");

input.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        let value = input.value.trim();

        if(value === ""){
            return;
        }

        if(boxList.length === 0){
            document.getElementById("result").innerHTML =
                "⚠️ Load box list first!";
            document.getElementById("result").className = "bad";
            focusScan();
            return;
        }

        if(boxList.includes(value)){
            document.getElementById("result").innerHTML =
                "✅ MATCH FOUND: " + value;
            document.getElementById("result").className = "ok";
        }
        else{
            document.getElementById("result").innerHTML =
                "❌ NOT IN LIST: " + value;
            document.getElementById("result").className = "bad";
        }

        // AUTO TAB / NEXT SCAN
        input.value = "";

        focusScan(); // 👈 this is your auto-tab behavior
    }
});

// keep focus even if clicked elsewhere
setInterval(focusScan, 1500);

</script>

</body>
</html>
